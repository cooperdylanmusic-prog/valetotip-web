<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">

  <!-- Navy background -->
  <rect width="200" height="230" rx="16" fill="#0B1F3A"/>

  <!-- Outer gold border -->
  <rect x="5" y="5" width="190" height="220" rx="12" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>

  <!-- Inner gold border -->
  <rect x="12" y="12" width="176" height="206" rx="8" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>

  <!-- Corner diamonds -->
  <polygon points="22,22 28,16 34,22 28,28" fill="#C9A84C" opacity="0.5"/>
  <polygon points="166,22 172,16 178,22 172,28" fill="#C9A84C" opacity="0.5"/>
  <polygon points="22,208 28,202 34,208 28,214" fill="#C9A84C" opacity="0.5"/>
  <polygon points="166,208 172,202 178,208 172,214" fill="#C9A84C" opacity="0.5"/>

  <!-- SC Crescent Moon — path only, no circle outline -->
  <!-- Main circle center (112,70) r=55, cut circle center (82,70) r=47 -->
  <!-- Top-left horn: (83,23), Bottom-left horn: (83,117) -->
  <!-- Outer arc: large clockwise from top to bottom around right side -->
  <!-- Inner arc: counterclockwise from bottom to top through right side of cut circle -->
  <path d="M 83 23 A 55 55 0 1 1 83 117 A 47 47 0 0 0 83 23 Z" fill="#C9A84C"/>

  <!-- Palm tree — lower left, below crescent -->
  <!-- Trunk curves from base (44,198) up to crown (52,132) -->
  <path d="M 44 198 C 40 172 46 152 52 132" fill="none" stroke="#C9A84C" stroke-width="5" stroke-linecap="round"/>
  <!-- Fronds radiating from crown -->
  <path d="M 52 132 C 68 122 82 114 90 102" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 52 132 C 55 115 54 100 50 84"  fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 52 132 C 36 120 22 114 16 102" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 52 132 C 34 132 20 136 16 148" fill="none" stroke="#C9A84C" stroke-width="2"   stroke-linecap="round"/>
  <path d="M 52 132 C 40 144 32 158 30 170" fill="none" stroke="#C9A84C" stroke-width="2"   stroke-linecap="round"/>

  <!-- Key fob hanging from left horn (83,117) -->
  <!-- Chain links -->
  <ellipse cx="83" cy="126" rx="3" ry="5"   fill="none" stroke="#C9A84C" stroke-width="1.8"/>
  <ellipse cx="83" cy="136" rx="5" ry="3"   fill="none" stroke="#C9A84C" stroke-width="1.8"/>
  <ellipse cx="83" cy="145" rx="3" ry="5"   fill="none" stroke="#C9A84C" stroke-width="1.8"/>
  <!-- Key ring -->
  <circle cx="83" cy="156" r="9"  fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <circle cx="83" cy="156" r="3.5" fill="#C9A84C"/>
  <!-- Key shaft -->
  <rect x="81" y="165" width="4" height="28" rx="1" fill="#C9A84C"/>
  <!-- Key teeth -->
  <rect x="85" y="170" width="6" height="4" rx="1" fill="#C9A84C"/>
  <rect x="85" y="178" width="4" height="4" rx="1" fill="#C9A84C"/>
  <rect x="85" y="186" width="5" height="4" rx="1" fill="#C9A84C"/>

  <!-- VALETOTIP label -->
  <text x="100" y="221" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="4">VALETOTIP</text>

</svg>
